name: Publish to NPM

on:
  push:
    branches: [master]
  release:
    types: [published]

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  github-release:
    name: Create Github Release
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    outputs:
      version: ${{ steps.meta.outputs.version }}
      semver: ${{ steps.meta.outputs.semver }}
      is_tag: ${{ steps.meta.outputs.is_tag }}
      commit_slug: ${{ steps.meta.outputs.commit_slug }}
    steps:
      - uses: nxtcoder17/actions/metadata@main
        id: meta

      - name: Create github release
        uses: nxtcoder17/actions/github-release-create@main
        with:
          name: ${{ steps.meta.outputs.version }}
          github_token: ${{ github.token }}
          pre_release: ${{ !fromJSON(steps.meta.outputs.is_tag) }}

  publish:
    needs: github-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Verify dist
        run: |
          if [ ! -f dist/index/index.js ]; then
            echo "ERROR: dist/index/index.js not found"
            exit 1
          fi
          if [ ! -f dist/index/index.d.ts ]; then
            echo "ERROR: dist/index/index.d.ts not found"
            exit 1
          fi
          echo "Build artifacts verified:"
          ls -laR dist/

      - name: Setup npm auth
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      - name: patch package version
        run: |+
          VERSION="${{ needs.github-release.outputs.semver }}"
          if [ "${{ needs.github-release.outputs.is_tag }}" != "true" ]; then
            VERSION="$VERSION.${{ needs.github-release.outputs.commit_slug }}"
          fi

      - name: Publish nightly
        if: needs.github-release.outputs.is_tag != 'true'
        env:
          VERSION: "${{ needs.github-release.outputs.semver }}.${{ needs.github-release.outputs.commit_slug }}"
        run: |+
          jq --arg v "$VERSION" '.version = $v' package.json > tmp.json && mv tmp.json package.json
          echo "Publishing Package version: $VERSION"
          bunx npm publish --provenance --access public --tag nightly

      - name: Publish release
        if: needs.github-release.outputs.is_tag == 'true'
        env:
          VERSION: "${{ needs.github-release.outputs.semver }}"
        run: |+
          jq --arg v "$VERSION" '.version = $v' package.json > tmp.json && mv tmp.json package.json
          echo "Publishing Package version: $VERSION"
          bunx npm publish --provenance --access public

      - name: Write job summary
        if: always()
        env:
          IS_TAG: ${{ needs.github-release.outputs.is_tag }}
          SEMVER: ${{ needs.github-release.outputs.semver }}
          COMMIT_SLUG: ${{ needs.github-release.outputs.commit_slug }}
        run: |
          PKG_NAME=$(jq -r '.name' package.json)
          if [ "$IS_TAG" = "true" ]; then
            VERSION="$SEMVER"
            TAG="latest"
          else
            VERSION="$SEMVER.$COMMIT_SLUG"
            TAG="nightly"
          fi
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## 📦 NPM Publish Summary

          | Field    | Value |
          | -------- | ----- |
          | Package  | \`$PKG_NAME\` |
          | Version  | \`$VERSION\` |
          | Tag      | \`$TAG\` |
          | Commit   | \`${{ github.sha }}\` |
          | Registry | [npmjs.com/$PKG_NAME](https://www.npmjs.com/package/$PKG_NAME) |

          ### Install
          \`\`\`sh
          # npm
          npm install $PKG_NAME@$VERSION

          # bun
          bun add $PKG_NAME@$VERSION
          \`\`\`
          EOF
